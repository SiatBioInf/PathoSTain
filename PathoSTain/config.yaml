data:
  pqt_path: data/metadata.parquet
  features_dir: data/features
  slide_id_to_feature_dir: null

split:
  # Replace these example slide IDs with the IDs used in your metadata file.
  train_slides:
    - train_slide_001
    - train_slide_002
    - train_slide_003
  val_slides:
    - val_slide_001
  test_slides:
    - test_slide_001

  # Alternatively, omit train_slides/val_slides and use k-fold splitting.
  use_kfold: false
  num_folds: 5
  fold_id: 0
  shuffle: true
  random_seed: 42
  candidate_slides: []

model:
  in_dim: 1536
  spatial_dim: 3
  d_model: 128
  num_context_tokens: 4
  num_heads: 4
  dropout: 0.1
  self_attn_layers: 1
  cross_attn_layers: 1
  ff_mult: 4
  use_feature_layernorm: true
  use_feature_l2_norm: true

target_transforms:
  # Metric names listed here are transformed with arcsinh before z-score normalization.
  # Leave the lists empty to use identity + z-score for all numeric target columns.
  moderate_asinh_metrics: []
  high_zero_asinh_metrics: []

loss:
  lambda_mse: 1.0
  lambda_local_rank: 0.3
  local_rank_radius_px: 300.0
  local_rank_margin: 0.0
  local_rank_max_pairs_per_metric: 256
  use_distance_weight: false
  distance_sigma: 150.0

optim:
  lr: 1.0e-4
  weight_decay: 1.0e-4
  lr_decay_factor: 0.5
  lr_patience: 3
  min_lr: 1.0e-6

train:
  seed: 42
  device: cuda
  batch_size: 128
  slides_per_batch: 2
  spots_per_slide: 64
  eval_batch_size: 256
  num_workers: 4
  min_epochs: 10
  max_epochs: 100
  early_stop_patience: 10
  grad_clip: 5.0
  selection_metric: ranking_score
  ranking_score_weights:
    spearman: 0.5
    c_index: 0.5
  output_dir: outputs/train/fold_0

test:
  batch_size: 256
  output_dir: outputs/test
